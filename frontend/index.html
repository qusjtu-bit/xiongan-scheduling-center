<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雄安新区建设和交通管理局 · 协同调度中心</title>
<link rel="stylesheet" href="css/portal.css">
</head>
<body>

<!-- ============ 登录页 ============ -->
<div id="loginView" class="login-view">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">雄</div>
      <div class="logo-text">
        <div class="logo-title">雄安新区建设和交通管理局</div>
        <div class="logo-sub">协同调度中心 · 统一工作门户</div>
      </div>
    </div>
    <div class="login-form">
      <label>账号</label>
      <input type="text" id="username" value="admin" placeholder="请输入账号">
      <label>密码</label>
      <input type="password" id="password" value="admin123" placeholder="请输入密码">
      <button class="btn-login" onclick="doLogin()">登 录</button>
    </div>
    <div class="login-accounts">
      <div style="font-size:12px;color:var(--text-3);margin-bottom:8px">快捷登录 · 点击账号自动填充</div>
      <div class="account-chips">
        <code onclick="fillAccount('admin','admin123')">admin（管理员）</code>
        <code onclick="fillAccount('zhangju','zhangju123')">zhangju（建设）</code>
        <code onclick="fillAccount('lichu','lichu123')">lichu（质量）</code>
        <code onclick="fillAccount('jiangchu','jiangchu123')">jiangchu（城管）</code>
        <code onclick="fillAccount('zhouchu','zhouchu123')">zhouchu（城乡）</code>
        <code onclick="fillAccount('chuzhang','chuzhang123')">chuzhang（交通）</code>
      </div>
      <div class="account-tip">登录后可在「系统管理-用户管理」查看全部账号 · 共18个账号覆盖12个处室</div>
    </div>
  </div>
  <div class="login-footer">Step 2 · 统一工作门户 &nbsp;|&nbsp; 雄安新区建设和交通管理局</div>
</div>

<!-- ============ 门户主框架 ============ -->
<div id="portalView" class="portal" style="display:none">
  <header class="topbar">
    <div class="brand" onclick="navTo('/workbench')">
      <span class="brand-mark">雄</span>
      <span class="brand-name">协同调度中心</span>
    </div>
    <div class="global-search">
      <span class="search-ico"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input id="globalSearch" placeholder="搜索应用、事项、人员…">
    </div>
    <div class="topbar-right">
      <span class="sys-clock" id="sysClock"></span>
      <span id="refreshDot" class="refresh-dot counting" title="数据每30秒自动刷新">30s</span>
      <div class="bell" onclick="navTo('/messages')" title="消息中心">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="bell-badge" id="msgBadge" style="display:none">0</span>
      </div>
      <div class="user-box">
        <div class="avatar" id="uAvatar">管</div>
        <div class="user-meta">
          <div class="user-name" id="uName">-</div>
          <div class="user-dept" id="uDept">-</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">退出</button>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="content"></main>
  </div>
</div>

<!-- 加载遮罩 -->
<div id="loading" class="loading-mask" style="display:none"><div class="spinner"></div></div>

<script src="js/portal.js"></script>
</body>
</html>
